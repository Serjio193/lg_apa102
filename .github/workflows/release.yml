name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio pycryptodome

      - name: Write private key
        shell: pwsh
        env:
          RELEASE_PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}
        run: |
          if (-not $env:RELEASE_PRIVATE_KEY) {
            throw "RELEASE_PRIVATE_KEY secret is missing"
          }
          New-Item -ItemType Directory -Force -Path keys | Out-Null
          Set-Content -Encoding ASCII -Path keys/release_private.pem -Value $env:RELEASE_PRIVATE_KEY

      - name: Build release package
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "main-${{ github.run_number }}-${{ github.sha }}".Substring(0, 20) }
          ./scripts/build_release.ps1 -Version $version

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
