name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio pycryptodome

      - name: Write private key
        shell: pwsh
        env:
          RELEASE_PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}
        run: |
          if (-not $env:RELEASE_PRIVATE_KEY) {
            throw "RELEASE_PRIVATE_KEY secret is missing"
          }
          New-Item -ItemType Directory -Force -Path keys | Out-Null
          Set-Content -Encoding ASCII -Path keys/release_private.pem -Value $env:RELEASE_PRIVATE_KEY

      - name: Build release package
        shell: pwsh
        run: |
          ./scripts/build_release.ps1 -Version "${{ github.ref_name }}"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/latest
