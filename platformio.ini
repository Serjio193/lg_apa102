[platformio]
default_envs = lolin_s2_mini

[env]
platform = espressif32@5.3.0
framework = arduino
board = lolin_s2_mini
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions_4mb_ota_fs_recovery.csv
extra_scripts = pre:scripts/prebuild_ui.py
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
  -D CORE_DEBUG_LEVEL=1

[env:lolin_s2_mini]
build_src_filter = +<main.cpp> -<recovery_main.cpp>

[env:lolin_s2_mini_recovery]
build_src_filter = +<recovery_main.cpp> -<main.cpp>
build_flags =
  ${env.build_flags}
  -D LB_RECOVERY_BUILD=1
